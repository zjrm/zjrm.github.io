<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>“建设湛江大讨论”意见建议征集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            字体家族：“微软 YaHei”，无衬线;
        }

        /* ———— 这里就是背景色，你随便改 ———— */
        身体 {
            背景: #f5f5f5; /* 默认为浅灰色，可改成任意颜色 */
            
        }

        .容器 {
            
            边距：0 自动;
            背景：白色;
            
            边框半径：8像素;
               
        }
         
            文本对齐：居中;
            下边距：20像素;
            颜色: #333;
        }
        .发布盒子 {
            边框：1像素 实线 #eee;
            
            边框半径：8像素;
            下边距：30像素;
        }
        .发布框 输入,
        .发布框 文本区,
        .发布框 选择 {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .publish-box button {publish-box button {
            填充：10px 20px;padding: 10px 20px;
            背景: #409eff;background: #409eff;
            颜色：白色；color: white;
            边框：无；border: none;
            边框半径：4px;border-radius: 4px;
            光标：指针；cursor: pointer;
        }}
        .tab {tab {
            显示：弹性布局；display: flex;
            间隙：10px;gap: 10px;
            bottom外边距: 20px;margin-bottom: 20px;
            flex-wrap: wrap;flex-wrap: wrap;
        }}
        .tab button {tab button {
            填充: 8px 16px;padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }
        .tab button.active {
            background: #409eff;
            color: white;
            border-color: #409eff;
        }
        .message-list {
            display: grid;
            gap: 15px;
        }
        .message-item {
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
        }
        .message-item .title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .message-item .type {
            color: #409eff;
            font-size: 12px;
            margin-bottom: 5px;
        }
        .message-item .content {
            margin: 10px 0;
            line-height: 1.5;
        }
        .message-item .time {
            font-size: 12px;
            color: #999;
            text-align: right;
        }
        .empty {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>留言板</h1>

    <div class="publish-box">
        <h2>我要留言</h2>
        <input type="text" id="name" placeholder="你的昵称">
        <select id="type">
            <option value="建议">建议</option>
            <option value="咨询">咨询</option>
            <option value="投诉">投诉</option>
            <option value="表扬">表扬</option>
        </select>
        <textarea id="content" rows="4" placeholder="留言内容"></textarea>
        <button onclick="publishMsg()">提交留言（需审核）</button>
    </div>

    <div class="tab">
        <button class="active" onclick="showType('all')">全部留言</button>
        <button onclick="showType('建议')">建议</button>
        <button onclick="showType('咨询')">咨询</button>
        <button onclick="showType('投诉')">投诉</button>
        <button onclick="showType('表扬')">表扬</button>
    </div>

    <div class="message-list" id="msgList"></div>
</div>

<script>
let currentType = 'all';

function getMsgList() {
    let list = JSON.parse(localStorage.getItem('msgList') || '[]');
    return list.filter(item => item.status === 'pass');
}

function render() {
    let list = getMsgList();
    let html = '';
    if (currentType !== 'all') {
        list = list.filter(item => item.type === currentType);
    }
    if (list.length === 0) {
        html = '<div class="empty">暂无已审核留言</div>';
    } else {
        list.forEach(item => {
            html += `
            <div class="message-item">
                <div class="type">【${item.type}】</div>
                <div class="title">${item.name}</div>
                <div class="content">${item.content}</div>
                <div class="time">${item.time}</div>
            </div>
            `;
        });
    }
    document.getElementById('msgList').innerHTML = html;
}

function publishMsg() {
    let name = document.getElementById('name').value.trim();
    let type = document.getElementById('type').value;
    let content = document.getElementById('content').value.trim();
    if (!name || !content) {
        alert('请填写昵称和内容');
        return;
    }
    let list = JSON.parse(localStorage.getItem('msgList') || '[]');
    list.unshift({
        id: Date.now(),
        name,
        type,
        content,
        time: new Date().toLocaleString(),
        status: 'wait'
    });
    localStorage.setItem('msgList', JSON.stringify(list));
    alert('留言成功，等待管理员审核');
    document.getElementById('name').value = '';
    document.getElementById('content').value = '';
}

function showType(type) {
    currentType = type;
    let btns = document.querySelectorAll('.tab button');
    btns.forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    render();
}

render();
</script>
</body>
</html>
